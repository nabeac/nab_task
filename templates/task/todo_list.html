{% extends 'index.html' %}
{% load humanize %}

{% block title %}
    تسک‌ها
{% endblock %}

{% block task %}
  <div class="max-w-2xl mx-auto px-4 py-10">
    <div class="bg-white rounded-3xl shadow-lg p-6 border border-slate-200">
      
      <div class="mb-6 text-center">
        <h1 class="text-3xl font-black text-slate-800">تودوی شخصی</h1>
        <p class="text-slate-500 mt-2 text-sm">کارهای روزانه‌ات را ساده مدیریت کن</p>
      </div>

      <!-- Add Task -->
      <div class="flex flex-col sm:flex-row gap-3 mb-6">
        <input
          id="taskInput"
          type="text"
          placeholder="مثلاً خرید نان"
          class="flex-1 px-4 py-3 rounded-2xl border border-slate-300 outline-none focus:ring-2 focus:ring-teal-500"
        />
        <button
          onclick="addTask()"
          class="bg-teal-600 hover:bg-teal-700 text-white px-6 py-3 rounded-2xl font-bold transition"
        >
          افزودن
        </button>
      </div>

      <!-- Filters -->
      <div class="flex flex-wrap gap-2 mb-6">
        <button onclick="setFilter('all')" class="filter-btn bg-slate-800 text-white px-4 py-2 rounded-xl text-sm">همه</button>
        <button onclick="setFilter('active')" class="filter-btn bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm">انجام نشده</button>
        <button onclick="setFilter('done')" class="filter-btn bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm">انجام شده</button>
        <button onclick="clearDone()" class="bg-rose-100 text-rose-700 px-4 py-2 rounded-xl text-sm">حذف انجام‌شده‌ها</button>
      </div>

      <!-- Task List -->
      <div id="taskList" class="space-y-3"></div>

      <!-- Empty State -->
      <div id="emptyState" class="hidden text-center py-10 text-slate-400">
        هنوز کاری ثبت نشده :)
      </div>

      <!-- Footer -->
      <div class="mt-6 pt-4 border-t border-slate-200 flex justify-between text-sm text-slate-500">
        <span id="taskCount">0 کار</span>
        <button onclick="clearAll()" class="text-rose-600 hover:text-rose-700 font-bold">حذف همه</button>
      </div>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('simple_todo_tasks')) || [];
    let currentFilter = 'all';

    function saveTasks() {
      localStorage.setItem('simple_todo_tasks', JSON.stringify(tasks));
    }

    function addTask() {
      const input = document.getElementById('taskInput');
      const text = input.value.trim();

      if (!text) return;

      tasks.unshift({
        id: Date.now(),
        text: text,
        done: false
      });

      input.value = '';
      saveTasks();
      renderTasks();
    }

    function toggleTask(id) {
      tasks = tasks.map(task =>
        task.id === id ? { ...task, done: !task.done } : task
      );
      saveTasks();
      renderTasks();
    }

    function deleteTask(id) {
      tasks = tasks.filter(task => task.id !== id);
      saveTasks();
      renderTasks();
    }

    function clearDone() {
      tasks = tasks.filter(task => !task.done);
      saveTasks();
      renderTasks();
    }

    function clearAll() {
      if (!confirm('همه کارها حذف شوند؟')) return;
      tasks = [];
      saveTasks();
      renderTasks();
    }

    function setFilter(filter) {
      currentFilter = filter;

      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.className = 'filter-btn bg-slate-200 text-slate-700 px-4 py-2 rounded-xl text-sm';
      });

      const buttons = document.querySelectorAll('.filter-btn');
      if (filter === 'all') buttons[0].className = 'filter-btn bg-slate-800 text-white px-4 py-2 rounded-xl text-sm';
      if (filter === 'active') buttons[1].className = 'filter-btn bg-slate-800 text-white px-4 py-2 rounded-xl text-sm';
      if (filter === 'done') buttons[2].className = 'filter-btn bg-slate-800 text-white px-4 py-2 rounded-xl text-sm';

      renderTasks();
    }

    function getFilteredTasks() {
      if (currentFilter === 'active') return tasks.filter(task => !task.done);
      if (currentFilter === 'done') return tasks.filter(task => task.done);
      return tasks;
    }

    function renderTasks() {
      const list = document.getElementById('taskList');
      const emptyState = document.getElementById('emptyState');
      const taskCount = document.getElementById('taskCount');

      const filteredTasks = getFilteredTasks();

      list.innerHTML = '';

      if (filteredTasks.length === 0) {
        emptyState.classList.remove('hidden');
      } else {
        emptyState.classList.add('hidden');
      }

      filteredTasks.forEach(task => {
        const item = document.createElement('div');
        item.className = 'flex items-center justify-between bg-slate-50 border border-slate-200 rounded-2xl px-4 py-3';

        item.innerHTML = `
          <div class="flex items-center gap-3">
            <input type="checkbox" ${task.done ? 'checked' : ''} onchange="toggleTask(${task.id})" class="w-5 h-5 accent-teal-600">
            <span class="${task.done ? 'line-through text-slate-400' : 'text-slate-800'}">${task.text}</span>
          </div>
          <button onclick="deleteTask(${task.id})" class="text-rose-500 hover:text-rose-700 text-sm font-bold">
            حذف
          </button>
        `;

        list.appendChild(item);
      });

      taskCount.textContent = `${tasks.length} کار`;
    }

    document.getElementById('taskInput').addEventListener('keypress', function(e) {
      if (e.key === 'Enter') addTask();
    });

    renderTasks();
  </script>

{% endblock %}
