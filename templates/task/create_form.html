{% extends 'index.html' %}
{% load crispy_forms_tags %}

{% block title %}
   ایجاد تسک جدید | ناب تسک
{% endblock %}

{% block task %}
<div class="max-w-3xl mx-auto my-10 px-4">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        <!-- هدر فرم -->
        <div class="bg-teal-500 p-6 text-white text-center">
            <h2 class="text-2xl font-black">ایجاد تسک جدید</h2>
            <p class="text-teal-100 text-sm mt-1">اطلاعات لازم برای پروژه یا فعالیت جدید را وارد کنید</p>
        </div>

        <!-- بدنه فرم -->
        <form method="post" enctype="multipart/form-data" class="p-8 space-y-6">
            {% csrf_token %}
            
            <!-- فیلدهای خودکار جنگو (Crispy) -->
            <div class="space-y-4 text-gray-700">
                {{ form|crispy }}
            </div>

            <!-- بخش انتخاب تاریخ (شخصی‌سازی شده) -->
            <div class="grid grid-cols-1 md:grid-cols-2 gap-6 pt-4 border-t border-gray-100">
                <div class="flex flex-col">
                    <label class="text-sm font-bold text-gray-600 mb-2 flex items-center">
                        <svg class="w-4 h-4 ml-1 text-teal-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z"></path></svg>
                        تاریخ شروع
                    </label>
                    <input id="jalali-start" name="start_date" readonly
                           class="bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-teal-500 focus:border-teal-500 block w-full p-3 transition-all cursor-pointer" 
                           placeholder="انتخاب زمان شروع">
                </div>

                <div class="flex flex-col">
                    <label class="text-sm font-bold text-gray-600 mb-2 flex items-center">
                        <svg class="w-4 h-4 ml-1 text-red-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4l3 3m6-3a9 9 0 11-18 0 9 9 0 0118 0z"></path></svg>
                        تاریخ پایان (مهلت)
                    </label>
                    <input id="jalali-end" name="end_date" readonly
                           class="bg-gray-50 border border-gray-200 text-gray-800 text-sm rounded-xl focus:ring-teal-500 focus:border-teal-500 block w-full p-3 transition-all cursor-pointer" 
                           placeholder="انتخاب زمان پایان">
                </div>
            </div>

            <!-- دکمه‌های عملیاتی -->
            <div class="flex items-center justify-end gap-4 pt-6">
                <a href="{% url 'home:list_task' %}" class="text-gray-500 hover:text-gray-700 font-semibold text-sm transition-colors">
                    انصراف
                </a>
                <button type="submit" class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-10 rounded-2xl shadow-lg shadow-teal-200 transition-all active:scale-95">
                    ثبت و ذخیره تسک
                </button>
            </div>
        </form>
    </div>
</div>

<script>
    $(document).ready(function() {
        const datePickerOptions = {
            format: "YYYY/MM/DD",
            initialValue: false,
            initialValueType: "persian",
            calendarType: "persian",
            autoClose: true,
            observer: true,
            toolbox: {
                calendarSwitch: {
                    enabled: false
                }
            }
        };

        $("#jalali-start").persianDatepicker(datePickerOptions);
        $("#jalali-end").persianDatepicker(datePickerOptions);
    });
</script>
{% endblock %}
