{% extends 'index.html' %}
{% load crispy_forms_tags %}

{% block title %}
   ثبت گزارش روز | ناب تسک
{% endblock %}

{% block task %}
<div class="max-w-3xl mx-auto my-10 px-4">
    <div class="bg-white rounded-3xl shadow-xl overflow-hidden border border-gray-100">
        
        <!-- هدر فرم -->
        <div class="bg-teal-500 p-6 text-white text-center">
            <h2 class="text-2xl font-black">ثبت گزارش روز</h2>
            <p class="text-teal-100 text-sm mt-1">اطلاعات گزارش روزانه خود را وارد کنید</p>
        </div>

        <!-- بدنه فرم -->
        <form method="post" enctype="multipart/form-data" class="p-8 space-y-6">
            {% csrf_token %}
            
            <!-- فیلدهای فرم -->
            <div class="space-y-4 text-gray-700">
                {{ form|crispy }}
            </div>
            <!-- دکمه‌های عملیاتی -->
            <div class="flex items-center justify-end gap-4 pt-6">
                <a href="{% url 'home:list_task' %}" class="text-gray-500 hover:text-gray-700 font-semibold text-sm transition-colors">
                    انصراف
                </a>
                <button type="submit"
                        class="bg-teal-500 hover:bg-teal-600 text-white font-bold py-3 px-10 rounded-2xl shadow-lg shadow-teal-200 transition-all active:scale-95">
                    ثبت گزارش روز
                </button>
            </div>
        </form>
    </div>
</div>


{% endblock %}
